<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Seisan" />
  <link rel="apple-touch-icon"
    href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMTgwIDE4MCI+PHJlY3Qgd2lkdGg9IjE4MCIgaGVpZ2h0PSIxODAiIHJ4PSI0MCIgZmlsbD0iIzExMTExMSIvPjxjaXJjbGUgY3g9IjY2IiBjeT0iOTAiIHI9IjMyIiBmaWxsPSIjM2I4MmY2Ii8+PGNpcmNsZSBjeD0iMTE0IiBjeT0iOTAiIHI9IjMyIiBmaWxsPSIjZWM0ODk5IiBmaWxsLW9wYWNpdHk9IjAuOSIvPjwvc3ZnPg==" />
  <title>Seisan</title>
  <style>
    :root {
      --ink: #111;
      --sub: #8a8a8e;
      --line: #ececef;
      --bg: #f6f6f8;
      --surface: #fff;
      --blue: #3b82f6;
      --pink: #ec4899;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, "SF Pro Display", Inter, sans-serif;
      padding-bottom: env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
    }

    input,
    select,
    button {
      font-family: inherit;
    }

    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    button {
      cursor: pointer;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      padding: 14px 20px 12px;
      width: 100%;
      padding-top: calc(14px + env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo svg {
      display: block;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .btn-add {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 9px 16px;
      font-weight: 700;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .month-nav button {
      background: none;
      border: none;
      color: var(--sub);
      padding: 4px;
      display: inline-flex;
      align-items: center;
    }

    .month-label {
      font-size: 14px;
      font-weight: 700;
      min-width: 100px;
      text-align: center;
    }

    /* ── Tab bar ── */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 9px 0 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      font-weight: 600;
      color: #b5b5ba;
    }

    .tab-btn.active {
      color: var(--ink);
    }

    .tab-icon {
      width: 21px;
      height: 21px;
      display: inline-flex;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .05);
      margin: 14px 16px 0;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      padding: 18px 20px 0;
      letter-spacing: 0.3px;
    }

    /* ── Form ── */
    .form-body {
      padding: 16px;
    }

    .payer-row,
    .split-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .payer-btn {
      flex: 1;
      padding: 11px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      background: var(--bg);
      color: var(--sub);
    }

    .amount-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .amount-wrap .prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      font-weight: 700;
      color: #c5c5ca;
      pointer-events: none;
    }

    .amount-input {
      width: 100%;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 14px 16px 14px 40px;
      font-size: 26px;
      font-weight: 800;
      color: var(--ink);
      transition: border-color .15s;
      outline: none;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 7px 13px;
      border-radius: 20px;
      border: none;
      font-size: 12.5px;
      font-weight: 600;
      color: #fff;
      opacity: .35;
      transition: opacity .12s;
    }

    .chip.active {
      opacity: 1;
    }

    .split-btn {
      flex: 1;
      padding: 9px 4px;
      border-radius: 12px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      background: var(--bg);
      color: #b5b5ba;
    }

    .date-note {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field {
      width: 100%;
      background: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 15px;
      color: var(--ink);
      outline: none;
    }

    .form-actions {
      display: flex;
      gap: 8px;
    }

    .btn-submit {
      flex: 1;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 13px;
      padding: 14px;
      font-weight: 700;
      font-size: 15px;
    }

    .btn-cancel {
      flex: 1;
      background: var(--bg);
      color: var(--sub);
      border: none;
      border-radius: 13px;
      padding: 14px;
      font-size: 15px;
    }

    /* ── Settlement ── */
    .settlement-main {
      padding: 18px 18px 16px;
    }

    .settlement-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .member-tag {
      border-radius: 7px;
      padding: 4px 12px;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
    }

    .arrow {
      color: #c5c5ca;
      font-size: 16px;
    }

    .settlement-amount {
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .settlement-none {
      font-weight: 700;
      font-size: 15px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--sub);
    }

    .stats-row {
      display: flex;
      border-top: 1px solid var(--line);
    }

    .stat {
      flex: 1;
      padding: 11px 14px;
      border-right: 1px solid var(--line);
    }

    .stat:last-child {
      border-right: none;
    }

    .stat-label {
      color: var(--sub);
      font-size: 10.5px;
      margin-bottom: 3px;
    }

    .stat-value {
      font-weight: 700;
      font-size: 14px;
    }

    /* ── History ── */
    .hist-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 18px;
      background: var(--surface);
      border: none;
    }

    .hist-title {
      font-weight: 700;
      font-size: 14px;
    }

    .txn-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .txn-info {
      flex: 1;
      min-width: 0;
    }

    .txn-cat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cat-badge {
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 10.5px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .txn-note {
      color: var(--sub);
      font-size: 12.5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .txn-date {
      font-size: 11px;
      color: #b5b5ba;
      margin-top: 3px;
    }

    .split-badge {
      flex-shrink: 0;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 10px;
      font-weight: 700;
    }

    .txn-amount {
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: -0.2px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      padding: 6px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: #b5b5ba;
      font-size: 13px;
    }

    /* ── Stats page ── */
    .cat-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .cat-row:first-child {
      border-top: none;
    }

    .cat-color {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .cat-name {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
    }

    .cat-bar-wrap {
      width: 72px;
      height: 5px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .cat-bar {
      height: 100%;
      border-radius: 3px;
    }

    .cat-amount {
      font-size: 13px;
      font-weight: 700;
      min-width: 66px;
      text-align: right;
    }

    .cat-pct {
      font-size: 10.5px;
      color: #b5b5ba;
      min-width: 30px;
      text-align: right;
    }

    /* ── Bar chart ── */
    .chart-wrap {
      padding: 18px 16px 8px;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 130px;
    }

    .chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      height: 100%;
      justify-content: flex-end;
    }

    .chart-bar {
      width: 100%;
      max-width: 34px;
      border-radius: 6px 6px 3px 3px;
      background: #d9d9de;
      transition: height .3s;
      min-height: 2px;
    }

    .chart-bar.current {
      background: var(--ink);
    }

    .chart-amt {
      font-size: 9.5px;
      font-weight: 700;
      color: var(--sub);
    }

    .chart-label {
      font-size: 10px;
      color: #b5b5ba;
      font-weight: 600;
      padding: 6px 0 12px;
    }

    .chart-labels {
      display: flex;
      gap: 8px;
    }

    .chart-labels span {
      flex: 1;
      text-align: center;
      font-size: 10px;
      color: #b5b5ba;
      font-weight: 600;
      padding: 6px 0 14px;
    }

    .chart-labels span.current {
      color: var(--ink);
    }

    /* ── Goal ── */
    .goal-body {
      padding: 16px;
    }

    .goal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .goal-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
    }

    .goal-amount {
      font-size: 15px;
      font-weight: 800;
    }

    .goal-bar-wrap {
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .goal-bar {
      height: 100%;
      border-radius: 5px;
      background: var(--ink);
      transition: width .3s;
    }

    .goal-bar.over {
      background: #ef4444;
    }

    .goal-status {
      font-size: 12px;
      color: var(--sub);
    }

    .goal-status b {
      color: var(--ink);
    }

    .goal-status.over b {
      color: #ef4444;
    }

    .goal-edit-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .goal-input {
      flex: 1;
      background: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    .goal-save {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 13px;
    }

    .goal-set-link {
      background: none;
      border: none;
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 0;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="app" id="app"></div>
  <script>
    /* ═══ Constants ═══ */
    const CATEGORIES = ["食費(スーパー)", "食費(コンビニ)", "食費(外食)", "娯楽", "買い物", "その他"];
    const CAT_COLOR = {
      "食費(スーパー)": "#22c55e", "食費(コンビニ)": "#f97316",
      "食費(外食)": "#ef4444", "娯楽": "#a855f7",
      "買い物": "#ec4899", "その他": "#6b7280"
    };
    const MEMBERS = ["自分", "彼女"];
    const SPLITS = [
      { key: "half", label: "折半", bg: "#333" },
      { key: "me", label: "自分", bg: "#3b82f6" },
      { key: "her", label: "彼女", bg: "#ec4899" },
    ];
    const MC = { "自分": "#3b82f6", "彼女": "#ec4899" };

    const fmt = n => "¥" + Math.abs(Math.round(n)).toLocaleString();
    const toMonth = d => d.slice(0, 7);
    const fmtMonth = m => { const [y, mo] = m.split("-"); return y + "年" + parseInt(mo) + "月"; };
    const monthShort = m => parseInt(m.split("-")[1]) + "月";
    const today = () => new Date().toISOString().slice(0, 10);
    const curMonth = () => toMonth(today());
    const blank = () => ({ paidBy: "自分", category: "食費(スーパー)", amount: "", date: today(), note: "", split: "half" });
    const splitOf = k => SPLITS.find(s => s.key === k);

    /* ═══ Storage ═══ */
    const KEY_TXNS = "seisan_txns";
    const KEY_GOALS = "seisan_goals";
    const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch (e) { return d; } };
    const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { } };

    /* ═══ Icons ═══ */
    const ICONS = {
      home: '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
      stats: '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
      target: '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
      plus: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
      close: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      edit: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
      trash: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>',
      chevUp: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>',
      chevDown: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>',
      chevLeft: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>',
      chevRight: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>',
      check: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    };
    const LOGO = '<svg width="26" height="26" viewBox="0 0 48 48"><rect width="48" height="48" rx="12" fill="#111"/><circle cx="18" cy="24" r="9" fill="#3b82f6"/><circle cx="30" cy="24" r="9" fill="#ec4899" fill-opacity="0.9"/></svg>';

    function svgEl(name) { const s = document.createElement("span"); s.innerHTML = ICONS[name]; s.style.display = "inline-flex"; return s; }

    /* ═══ State ═══ */
    let st = {
      txns: load(KEY_TXNS, []),
      goals: load(KEY_GOALS, {}),     // { "2026-06": 50000 }
      month: curMonth(),
      form: blank(), showForm: false,
      editId: null, editForm: null,
      showHist: true, tab: "home",
      editingGoal: false,
    };
    let formDraft = { amount: "", note: "", date: today() };
    let editDraft = { amount: "", note: "", date: "" };

    function set(patch) {
      st = Object.assign({}, st, typeof patch === "function" ? patch(st) : patch);
      save(KEY_TXNS, st.txns);
      save(KEY_GOALS, st.goals);
      render();
    }

    function shiftMonth(delta) {
      const [y, m] = st.month.split("-").map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      const nm = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
      formDraft = { amount: "", note: "", date: today() };
      set({ month: nm, form: blank(), showForm: false, editId: null, editingGoal: false });
    }

    function lastNMonths(month, n) {
      const arr = [];
      const [y, m] = month.split("-").map(Number);
      for (let i = n - 1; i >= 0; i--) {
        const d = new Date(y, m - 1 - i, 1);
        arr.push(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"));
      }
      return arr;
    }

    function calcSettlement(txns) {
      const d = txns.reduce((acc, t) => {
        const p = t.paidBy === "自分" ? t.amount : 0;
        return acc + (t.split === "half" ? t.amount / 2 - p : t.split === "me" ? t.amount - p : -p);
      }, 0);
      if (d > 0.5) return { from: "自分", to: "彼女", amount: Math.round(d) };
      if (d < -0.5) return { from: "彼女", to: "自分", amount: Math.round(-d) };
      return null;
    }

    /* ═══ DOM helpers ═══ */
    function e(tag, cls, props) {
      const el = document.createElement(tag);
      if (cls) el.className = cls;
      if (props) Object.entries(props).forEach(([k, v]) => {
        if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === "style") Object.assign(el.style, v);
        else el[k] = v;
      });
      return el;
    }
    function append(p, ...ch) { ch.flat().forEach(c => c != null && p.append(c)); return p; }
    function txt(s) { return document.createTextNode(s); }

    /* ═══ Form builder ═══ */
    function buildForm(form, draft, onFormChange, onSubmit, onCancel, submitLabel) {
      const catColor = CAT_COLOR[form.category] || "#333";
      const wrap = e("div", "form-body");

      const payerRow = append(e("div", "payer-row"),
        ...MEMBERS.map(p => {
          const b = e("button", "payer-btn", { textContent: p + "が払う", onclick: () => onFormChange("paidBy", p) });
          if (form.paidBy === p) { b.style.backgroundColor = MC[p]; b.style.color = "#fff"; }
          return b;
        })
      );

      const amountWrap = e("div", "amount-wrap");
      const prefix = e("span", "prefix"); prefix.textContent = "¥";
      const amountInput = e("input", "amount-input", { type: "number", inputMode: "numeric", placeholder: "0" });
      amountInput.style.borderColor = catColor;
      amountInput.value = draft.amount;
      amountInput.addEventListener("input", ev => { draft.amount = ev.target.value; });
      append(amountWrap, prefix, amountInput);

      const chips = append(e("div", "chips"),
        ...CATEGORIES.map(c => {
          const b = e("button", "chip" + (form.category === c ? " active" : ""), { textContent: c, onclick: () => onFormChange("category", c) });
          b.style.backgroundColor = CAT_COLOR[c];
          return b;
        })
      );

      const splitRow = append(e("div", "split-row"),
        ...SPLITS.map(m => {
          const b = e("button", "split-btn", { textContent: m.label, onclick: () => onFormChange("split", m.key) });
          if (form.split === m.key) { b.style.backgroundColor = m.bg; b.style.color = "#fff"; }
          return b;
        })
      );

      const dateNote = e("div", "date-note");
      const dateInput = e("input", "field", { type: "date" });
      dateInput.value = draft.date;
      dateInput.addEventListener("change", ev => { draft.date = ev.target.value; });
      const noteInput = e("input", "field", { placeholder: "メモ" });
      noteInput.value = draft.note;
      noteInput.addEventListener("input", ev => { draft.note = ev.target.value; });
      append(dateNote, dateInput, noteInput);

      const actions = append(e("div", "form-actions"),
        e("button", "btn-submit", { textContent: submitLabel, onclick: () => onSubmit(amountInput.value, dateInput.value, noteInput.value) }),
        onCancel ? e("button", "btn-cancel", { textContent: "キャンセル", onclick: onCancel }) : null
      );

      return append(wrap, payerRow, amountWrap, chips, splitRow, dateNote, actions);
    }

    /* ═══ Home ═══ */
    function renderHome(root, monthTxns) {
      const { form, showForm, editId, editForm, showHist } = st;
      const settlement = calcSettlement(monthTxns);
      const total = monthTxns.reduce((s, t) => s + t.amount, 0);
      const paid = { "自分": 0, "彼女": 0 };
      monthTxns.forEach(t => paid[t.paidBy] += t.amount);

      if (showForm) {
        const formCard = e("div", "card");
        append(formCard, buildForm(form, formDraft,
          (k, v) => set({ form: Object.assign({}, st.form, { [k]: v }) }),
          (amount, date, note) => {
            if (!amount || isNaN(amount)) return;
            set(s => ({ txns: [...s.txns, Object.assign({}, st.form, { id: Date.now(), amount: Number(amount), date, note })], form: blank(), showForm: false }));
            formDraft = { amount: "", note: "", date: today() };
          }, null, "追加する"
        ));
        append(root, formCard);
      }

      /* Settlement */
      const settlCard = e("div", "card");
      const settlMain = e("div", "settlement-main");
      if (settlement) {
        const row = e("div", "settlement-row");
        const tags = e("div", "", { style: { display: "flex", alignItems: "center", gap: "8px" } });
        append(tags,
          e("span", "member-tag", { textContent: settlement.from, style: { backgroundColor: MC[settlement.from] } }),
          e("span", "arrow", { textContent: "→" }),
          e("span", "member-tag", { textContent: settlement.to, style: { backgroundColor: MC[settlement.to] } })
        );
        const amt = e("span", "settlement-amount"); amt.textContent = fmt(settlement.amount);
        append(row, tags, amt); append(settlMain, row);
      } else {
        const none = e("div", "settlement-none");
        append(none, svgEl("check"), txt("精算なし"));
        append(settlMain, none);
      }
      const statsRow = e("div", "stats-row");
      ["自分", "彼女", "合計"].forEach((label, i) => {
        const stat = e("div", "stat");
        append(stat,
          e("div", "stat-label", { textContent: i < 2 ? label + "が支払い" : "合計" }),
          e("div", "stat-value", { textContent: fmt(i < 2 ? paid[label] : total) })
        );
        append(statsRow, stat);
      });
      append(settlCard, settlMain, statsRow);
      append(root, settlCard);

      /* History */
      const histCard = e("div", "card");
      const histToggle = e("button", "hist-toggle", { onclick: () => set({ showHist: !showHist }) });
      append(histToggle,
        e("span", "hist-title", { textContent: "履歴 (" + monthTxns.length + ")" }),
        (() => { const s = e("span"); s.innerHTML = showHist ? ICONS.chevUp : ICONS.chevDown; s.style.color = "#b5b5ba"; return s; })()
      );
      append(histCard, histToggle);

      if (showHist) {
        if (monthTxns.length === 0) {
          append(histCard, e("div", "empty", { textContent: "この月の記録はありません" }));
        } else {
          [...monthTxns].sort((a, b) => b.date.localeCompare(a.date)).forEach(t => {
            const wrap = e("div");
            if (editId === t.id) {
              append(wrap, buildForm(editForm, editDraft,
                (k, v) => set({ editForm: Object.assign({}, st.editForm, { [k]: v }) }),
                (amount, date, note) => {
                  if (!amount || isNaN(amount)) return;
                  set(s => ({ txns: s.txns.map(x => x.id === editId ? Object.assign({}, st.editForm, { amount: Number(amount), date, note }) : x), editId: null, editForm: null }));
                }, () => set({ editId: null, editForm: null }), "保存"
              ));
            } else {
              const row = e("div", "txn-row");
              const avatar = e("div", "avatar", { textContent: t.paidBy === "自分" ? "私" : "彼", style: { backgroundColor: MC[t.paidBy] } });
              const info = e("div", "txn-info");
              const catLine = e("div", "txn-cat");
              const badge = e("span", "cat-badge", { textContent: t.category, style: { backgroundColor: CAT_COLOR[t.category] } });
              append(catLine, badge);
              if (t.note) append(catLine, e("span", "txn-note", { textContent: t.note }));
              append(info, catLine, e("div", "txn-date", { textContent: t.date }));
              const sp = splitOf(t.split);
              const spBadge = e("button", "split-badge", {
                textContent: sp.label, style: { backgroundColor: sp.bg },
                onclick: () => {
                  const i = SPLITS.findIndex(s => s.key === t.split);
                  set(s => ({ txns: s.txns.map(x => x.id !== t.id ? x : Object.assign({}, x, { split: SPLITS[(i + 1) % SPLITS.length].key })) }));
                }
              });
              const amt = e("div", "txn-amount", { textContent: fmt(t.amount) });
              const editBtn = e("button", "icon-btn", {
                style: { color: "#c5c5ca" },
                onclick: () => { editDraft = { amount: String(t.amount), note: t.note, date: t.date }; set({ editId: t.id, editForm: Object.assign({}, t) }); }
              });
              editBtn.innerHTML = ICONS.edit;
              const delBtn = e("button", "icon-btn", {
                style: { color: "#d9d9de" },
                onclick: () => set(s => ({ txns: s.txns.filter(x => x.id !== t.id) }))
              });
              delBtn.innerHTML = ICONS.trash;
              append(row, avatar, info, spBadge, amt, editBtn, delBtn);
              append(wrap, row);
            }
            append(histCard, wrap);
          });
        }
      }
      append(root, histCard);
    }

    /* ═══ Stats ═══ */
    function renderStats(root) {
      const { txns, month } = st;

      /* Bar chart — last 6 months */
      append(root, e("div", "section-title", { textContent: "月別推移（直近6ヶ月）" }));
      const months = lastNMonths(month, 6);
      const totals = months.map(m => txns.filter(t => toMonth(t.date) === m).reduce((s, t) => s + t.amount, 0));
      const maxTotal = Math.max(...totals, 1);

      const chartCard = e("div", "card");
      const chartWrap = e("div", "chart-wrap");
      const chart = e("div", "chart");
      months.forEach((m, i) => {
        const col = e("div", "chart-col");
        const amtLabel = e("div", "chart-amt", { textContent: totals[i] > 0 ? "¥" + (totals[i] >= 10000 ? (totals[i] / 10000).toFixed(1) + "万" : totals[i].toLocaleString()) : "" });
        const bar = e("div", "chart-bar" + (m === month ? " current" : ""));
        bar.style.height = Math.max(totals[i] / maxTotal * 100, 2) + "%";
        append(col, amtLabel, bar);
        append(chart, col);
      });
      const labels = e("div", "chart-labels");
      months.forEach(m => append(labels, e("span", (m === month ? "current" : ""), { textContent: monthShort(m) })));
      append(chartWrap, chart);
      append(chartCard, chartWrap, labels);
      append(root, chartCard);

      /* Category breakdown — current month */
      append(root, e("div", "section-title", { textContent: "カテゴリ別（" + fmtMonth(month) + "）" }));
      const monthTxns = txns.filter(t => toMonth(t.date) === month);
      const total = monthTxns.reduce((s, t) => s + t.amount, 0);
      const byCat = {};
      CATEGORIES.forEach(c => byCat[c] = 0);
      monthTxns.forEach(t => byCat[t.category] += t.amount);
      const sorted = CATEGORIES.filter(c => byCat[c] > 0).sort((a, b) => byCat[b] - byCat[a]);

      const catCard = e("div", "card");
      if (sorted.length === 0) {
        append(catCard, e("div", "empty", { textContent: "この月の記録はありません" }));
      } else {
        sorted.forEach(cat => {
          const amt = byCat[cat];
          const pct = total > 0 ? Math.round(amt / total * 100) : 0;
          const row = e("div", "cat-row");
          const barWrap = e("div", "cat-bar-wrap");
          const bar = e("div", "cat-bar"); bar.style.backgroundColor = CAT_COLOR[cat]; bar.style.width = pct + "%";
          append(barWrap, bar);
          append(row,
            e("div", "cat-color", { style: { backgroundColor: CAT_COLOR[cat] } }),
            e("div", "cat-name", { textContent: cat }),
            barWrap,
            e("div", "cat-amount", { textContent: fmt(amt) }),
            e("div", "cat-pct", { textContent: pct + "%" })
          );
          append(catCard, row);
        });
      }
      append(root, catCard);
    }

    /* ═══ Goal ═══ */
    function renderGoal(root) {
      const { txns, month, goals, editingGoal } = st;
      const monthTxns = txns.filter(t => toMonth(t.date) === month);
      const total = monthTxns.reduce((s, t) => s + t.amount, 0);
      const goal = goals[month];

      append(root, e("div", "section-title", { textContent: "今月の支出目標" }));
      const card = e("div", "card");
      const body = e("div", "goal-body");

      if (goal && !editingGoal) {
        const pct = Math.min(Math.round(total / goal * 100), 999);
        const over = total > goal;

        const row1 = e("div", "goal-row");
        append(row1,
          e("span", "goal-label", { textContent: "目標額" }),
          e("span", "goal-amount", { textContent: fmt(goal) })
        );
        const row2 = e("div", "goal-row");
        append(row2,
          e("span", "goal-label", { textContent: "使用額" }),
          e("span", "goal-amount", { textContent: fmt(total), style: over ? { color: "#ef4444" } : {} })
        );
        const barWrap = e("div", "goal-bar-wrap");
        const bar = e("div", "goal-bar" + (over ? " over" : ""));
        bar.style.width = Math.min(pct, 100) + "%";
        append(barWrap, bar);

        const status = e("div", "goal-status" + (over ? " over" : ""));
        if (over) {
          status.innerHTML = "目標を <b>" + fmt(total - goal) + "</b> 超過しています（" + pct + "%）";
        } else {
          status.innerHTML = "残り <b>" + fmt(goal - total) + "</b> 使えます（" + pct + "%消化）";
        }

        const editLink = e("button", "goal-set-link", { textContent: "目標を変更", onclick: () => set({ editingGoal: true }) });
        append(body, row1, row2, barWrap, status, editLink);
      } else {
        const label = e("div", "goal-label", { textContent: goal ? "新しい目標額を入力" : "今月の目標額を設定しましょう", style: { marginBottom: "10px" } });
        const editRow = e("div", "goal-edit-row");
        const input = e("input", "goal-input", { type: "number", inputMode: "numeric", placeholder: "例: 50000" });
        if (goal) input.value = goal;
        const saveBtn = e("button", "goal-save", {
          textContent: "保存", onclick: () => {
            const v = Number(input.value);
            if (!v || isNaN(v) || v <= 0) return;
            set(s => ({ goals: Object.assign({}, s.goals, { [month]: v }), editingGoal: false }));
          }
        });
        append(editRow, input, saveBtn);
        append(body, label, editRow);
        if (goal) append(body, e("button", "goal-set-link", { textContent: "キャンセル", onclick: () => set({ editingGoal: false }), style: { marginTop: "10px" } }));
      }

      append(card, body);
      append(root, card);

      /* カテゴリ別の支出上位も参考表示 */
      const byCat = {};
      CATEGORIES.forEach(c => byCat[c] = 0);
      monthTxns.forEach(t => byCat[t.category] += t.amount);
      const top = CATEGORIES.filter(c => byCat[c] > 0).sort((a, b) => byCat[b] - byCat[a]).slice(0, 3);
      if (top.length > 0) {
        append(root, e("div", "section-title", { textContent: "支出が多いカテゴリ" }));
        const topCard = e("div", "card");
        top.forEach(cat => {
          const row = e("div", "cat-row");
          append(row,
            e("div", "cat-color", { style: { backgroundColor: CAT_COLOR[cat] } }),
            e("div", "cat-name", { textContent: cat }),
            e("div", "cat-amount", { textContent: fmt(byCat[cat]) })
          );
          append(topCard, row);
        });
        append(root, topCard);
      }
    }

    /* ═══ Render ═══ */
    function render() {
      const { month, tab } = st;
      const monthTxns = st.txns.filter(t => toMonth(t.date) === month);
      const root = e("div", "app");

      /* Header */
      const header = e("div", "header");
      const headerTop = e("div", "header-top");
      const logo = e("div", "logo");
      logo.innerHTML = LOGO;
      append(logo, e("span", "logo-text", { textContent: "Seisan" }));
      append(headerTop, logo);
      if (tab === "home") {
        const addBtn = e("button", "btn-add", {
          onclick: () => { formDraft = { amount: "", note: "", date: today() }; set({ showForm: !st.showForm, editId: null, editForm: null, form: blank() }); }
        });
        append(addBtn, svgEl(st.showForm ? "close" : "plus"), txt(st.showForm ? "閉じる" : "追加"));
        append(headerTop, addBtn);
      }
      const monthNav = append(e("div", "month-nav"),
        (() => { const b = e("button", "", { onclick: () => shiftMonth(-1) }); b.innerHTML = ICONS.chevLeft; return b; })(),
        e("span", "month-label", { textContent: fmtMonth(month) }),
        (() => { const b = e("button", "", { onclick: () => shiftMonth(1) }); b.innerHTML = ICONS.chevRight; return b; })()
      );
      append(header, headerTop, monthNav);
      append(root, header);

      if (tab === "home") renderHome(root, monthTxns);
      else if (tab === "stats") renderStats(root);
      else renderGoal(root);

      /* Tab bar */
      const tabbar = e("div", "tabbar");
      [["home", "home", "ホーム"], ["stats", "stats", "明細"], ["goal", "target", "目標"]].forEach(([key, ic, label]) => {
        const btn = e("button", "tab-btn" + (tab === key ? " active" : ""), { onclick: () => set({ tab: key }) });
        const icon = e("span", "tab-icon"); icon.innerHTML = ICONS[ic];
        append(btn, icon, e("span", null, { textContent: label }));
        append(tabbar, btn);
      });
      append(root, tabbar);

      document.getElementById("app").replaceWith(root);
      root.id = "app";
    }

    render();
  </script>
</body>

</html>
